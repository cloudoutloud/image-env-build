name: Trivy Security Scan

on:
  workflow_dispatch:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main

permissions:
  contents: read
  pull-requests: write

jobs:
  discover-images:
    name: Discover Images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.find.outputs.images }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Find all image directories
      id: find
      run: |
        images=$(find images -name "Dockerfile" -exec dirname {} \; | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(select(length > 0))')
        echo "images=$images" >> "$GITHUB_OUTPUT"
        echo "Found images: $images"

  trivy-scan:
    name: Trivy Scan - ${{ matrix.image }}
    needs: discover-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover-images.outputs.images) }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Build container image
      run: |
        docker build -t ${{ matrix.image }}:${{ github.sha }} -f images/${{ matrix.image }}/Dockerfile images/${{ matrix.image }}/

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.35.0
      with:
        image-ref: "${{ matrix.image }}:${{ github.sha }}"
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: "CRITICAL,HIGH,MEDIUM,LOW"
        output: 'trivy-report.txt'

    # Updates comment for every commit
    - name: Comment PR with Trivy report
      # if: always()
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: trivy-scan-${{ matrix.image }}
        path: trivy-report.txt
