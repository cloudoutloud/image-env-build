name: Trivy Security Scan

on:
  workflow_dispatch:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main

permissions:
  contents: read
  pull-requests: write

jobs:
  discover-images:
    name: Discover Images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.find.outputs.images }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Find all image directories
      id: find
      run: |
        images=$(find images -name "Dockerfile" -exec dirname {} \; | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(select(length > 0))')
        echo "images=$images" >> "$GITHUB_OUTPUT"
        echo "Found images: $images"

  trivy-scan:
    name: Trivy Scan - ${{ matrix.image }}
    needs: discover-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover-images.outputs.images) }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Build container image
      run: |
        docker build -t ${{ matrix.image }}:${{ github.sha }} -f images/${{ matrix.image }}/Dockerfile images/${{ matrix.image }}/

    - name: Export image for scanning locally
      id: export-image
      run: |
        buildah push ${{ steps.build-image.outputs.image }}:${{ env.TAGS }} \
          docker-archive:/tmp/scan-image.tar

    - name: Run Trivy vulnerability scanner
      id: trivy-scan
      uses: aquasecurity/trivy-action@0.35.0
      with:
        scan-type: 'image'
        input: /tmp/scan-image.tar
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: "CRITICAL,HIGH"
      env:
        TRIVY_DISABLE_VEX_NOTICE: 'false'

    # - name: Run Trivy vulnerability scanner
